<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Step-by-Step</title>

<style>
body{
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container{ max-width:900px; margin:auto; }

select,input,button{
    padding:8px;
    margin:5px;
}

.bars{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    height:250px;
}

.bar{
    width:20px;
    margin:2px;
    background:cyan;
}

.compare{ background:red !important; }
.swap{ background:lime !important; }
.pivot{ background:orange !important; }

.info{
    margin-top:10px;
    background:#333;
    padding:10px;
    border-radius:8px;
    text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 Sorting Step-by-Step</h2>

<input id="input" placeholder="เช่น 5,3,8,1,2">

<br>

<select id="algo">
<option value="bubble">Bubble Sort</option>
<option value="selection">Selection Sort</option>
<option value="insertion">Insertion Sort</option>
<option value="merge">Merge Sort</option>
<option value="quick">Quick Sort</option>
</select>

<br>

<button onclick="start()">Start</button>
<button onclick="nextStep()">➡ Next</button>

<div class="bars" id="bars"></div>

<div class="info" id="info"></div>

</div>

<script>

// ===== GLOBAL =====
let steps=[];
let stepIndex=0;

// ===== Utils =====
function getArray(){
    return document.getElementById("input").value
    .split(",").map(x=>Number(x));
}

function drawBars(arr, highlight={}){
    let bars=document.getElementById("bars");
    bars.innerHTML="";

    arr.forEach((v,i)=>{
        let d=document.createElement("div");
        d.className="bar";
        d.style.height=v*20+"px";

        if(highlight.compare?.includes(i)) d.classList.add("compare");
        if(highlight.swap?.includes(i)) d.classList.add("swap");
        if(highlight.pivot===i) d.classList.add("pivot");

        bars.appendChild(d);
    });
}

// ===== Step Engine =====
function addStep(arr, text, highlight={}){
    steps.push({
        arr:[...arr],
        text,
        highlight
    });
}

function nextStep(){
    if(stepIndex >= steps.length) return;

    let s = steps[stepIndex];
    drawBars(s.arr, s.highlight);
    document.getElementById("info").innerText = s.text;

    stepIndex++;
}

// ================= SORTING =================

// Bubble
function bubbleSteps(arr){
    let a=[...arr];

    for(let i=0;i<a.length;i++){
        for(let j=0;j<a.length-i-1;j++){

            addStep(a,`เปรียบเทียบ ${a[j]} กับ ${a[j+1]}`,{
                compare:[j,j+1]
            });

            if(a[j]>a[j+1]){
                [a[j],a[j+1]]=[a[j+1],a[j]];

                addStep(a,`สลับตำแหน่ง`,{
                    swap:[j,j+1]
                });
            }
        }
    }
}

// Selection
function selectionSteps(arr){
    let a=[...arr];

    for(let i=0;i<a.length;i++){
        let min=i;

        for(let j=i+1;j<a.length;j++){
            if(a[j]<a[min]) min=j;
        }

        addStep(a,`เลือก min = ${a[min]}`,{compare:[min]});

        [a[i],a[min]]=[a[min],a[i]];

        addStep(a,`สลับกับตำแหน่ง ${i}`,{swap:[i,min]});
    }
}

// Insertion
function insertionSteps(arr){
    let a=[...arr];

    for(let i=1;i<a.length;i++){
        let key=a[i];
        let j=i-1;

        addStep(a,`Insert ${key}`);

        while(j>=0 && a[j]>key){
            a[j+1]=a[j];
            j--;

            addStep(a,"เลื่อนค่าไปขวา",{swap:[j+1]});
        }

        a[j+1]=key;

        addStep(a,"ใส่ตำแหน่งถูกต้อง",{swap:[j+1]});
    }
}

// Merge
function mergeSteps(arr){

    function helper(a){

        if(a.length<=1) return a;

        let mid=Math.floor(a.length/2);
        let left=a.slice(0,mid);
        let right=a.slice(mid);

        addStep(a,`แบ่ง → ${left} | ${right}`);

        let l=helper(left);
        let r=helper(right);

        let res=[];
        while(l.length && r.length){
            if(l[0]<r[0]) res.push(l.shift());
            else res.push(r.shift());
        }

        let merged=[...res,...l,...r];

        addStep(merged,"รวมกลับ");

        return merged;
    }

    helper(arr);
}

// Quick
function quickSteps(arr){

    function helper(a){

        if(a.length<=1) return a;

        let pivot=a[a.length-1];
        let left=[],right=[];

        addStep(a,`Pivot = ${pivot}`,{pivot:a.length-1});

        for(let i=0;i<a.length-1;i++){
            if(a[i]<pivot) left.push(a[i]);
            else right.push(a[i]);
        }

        addStep(
            [...left,pivot,...right],
            `Split → L:${left} R:${right}`,
            {pivot:left.length}
        );

        let l=helper(left);
        let r=helper(right);

        let res=[...l,pivot,...r];

        addStep(res,"รวมกลับ");

        return res;
    }

    helper(arr);
}

// ===== Main =====
function start(){

    steps=[];
    stepIndex=0;

    let arr=getArray();
    let algo=document.getElementById("algo").value;

    drawBars(arr);

    if(algo==="bubble") bubbleSteps(arr);
    if(algo==="selection") selectionSteps(arr);
    if(algo==="insertion") insertionSteps(arr);
    if(algo==="merge") mergeSteps(arr);
    if(algo==="quick") quickSteps(arr);

    nextStep();
}

</script>

</body>
</html>
