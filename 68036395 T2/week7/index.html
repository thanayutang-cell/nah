<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infix to Postfix Visualizer</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:35px;
border-radius:15px;
width:600px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:80%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
background:#667eea;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#4c5fd7;
}

.result{
margin-top:15px;
padding:10px;
background:#f1f1f1;
border-radius:8px;
font-size:18px;
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#667eea;
color:white;
}

tr:nth-child(even){
background:#f9f9f9;
}

</style>
</head>

<body>

<div class="container">

<h2>Infix → Postfix Visualizer</h2>

<input id="expression" placeholder="Example: A+(B*C)">

<br>

<button onclick="convert()">Convert</button>

<div class="result">
Postfix : <span id="output">-</span>
</div>

<table id="stepTable">
<tr>
<th>Index</th>
<th>Char</th>
<th>Stack</th>
<th>Output</th>
</tr>
</table>

</div>

<script>

function precedence(op){
if(op=='+'||op=='-') return 1
if(op=='*'||op=='/') return 2
if(op=='^') return 3
return 0
}

function isOperand(ch){
return /^[A-Za-z0-9]$/.test(ch)
}

function convert(){

let exp=document.getElementById("expression").value.replace(/\s/g,'')

let stack=[]
let output=""

let table=document.getElementById("stepTable")

table.innerHTML=
`<tr>
<th>Index</th>
<th>Char</th>
<th>Stack</th>
<th>Output</th>
</tr>`

for(let i=0;i<exp.length;i++){

let char=exp[i]

if(isOperand(char)){
output+=char
}

else if(char=='('){
stack.push(char)
}

else if(char==')'){

while(stack.length && stack[stack.length-1]!='('){
output+=stack.pop()
}

stack.pop()

}

else{

while(stack.length && precedence(stack[stack.length-1])>=precedence(char)){
output+=stack.pop()
}

stack.push(char)

}

let row=`
<tr>
<td>${i}</td>
<td>${char}</td>
<td>${stack.join(" ")}</td>
<td>${output}</td>
</tr>
`

table.innerHTML+=row

}

while(stack.length){
output+=stack.pop()

let row=`
<tr>
<td>-</td>
<td>POP</td>
<td>${stack.join(" ")}</td>
<td>${output}</td>
</tr>
`

table.innerHTML+=row
}

document.getElementById("output").innerText=output

}

</script>

</body>
</html>
