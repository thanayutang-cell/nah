<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Full Fixed</title>

<style>
body{font-family:Arial;background:#1e1e2f;color:white;text-align:center;}
.container{max-width:1200px;margin:auto;}
button,select,input{padding:8px;margin:5px;}

.bars{display:flex;align-items:flex-end;height:300px;overflow-x:auto;}
.bar{margin:2px;background:cyan;text-align:center;font-size:10px;}

.compare{background:red!important;}
.swap{background:lime!important;}
.pivot{background:orange!important;}

table{width:100%;margin-top:20px;border-collapse:collapse;background:#222;}
th,td{border:1px solid #555;padding:6px;font-size:12px;}
th{background:#444;}
</style>
</head>

<body>
<div class="container">

<h2>🎓 Sorting System (Fixed + 100+ Support)</h2>

<input id="size" type="number" value="20" min="2" max="300">
<button onclick="randomStudents()">🎲 Random</button>

<select id="algo">
<option value="bubble">Bubble</option>
<option value="selection">Selection</option>
<option value="insertion">Insertion</option>
<option value="merge">Merge</option>
<option value="quick">Quick</option>
<option value="shell">Shell</option>
</select>

<button onclick="startSort()">Start</button>
<button onclick="nextStep()">➡ Next</button>
<button onclick="play()">▶ Play</button>
<button onclick="pause()">⏸ Pause</button>

<input id="speed" type="range" min="50" max="1500" value="300">

<div class="bars" id="bars"></div>
<div id="info"></div>

<table>
<thead>
<tr>
<th>Step</th>
<th>Array</th>
<th>Explanation</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

let steps=[], stepIndex=0, timer=null;
let currentArr=[];

// ===== RULE =====
function shouldSwap(a,b){
    if(a.score > b.score) return true;
    if(a.score===b.score && a.name > b.name) return true;
    return false;
}

// ===== EXPLAIN =====
function explain(a,b){
    if(!a || !b) return "ข้อมูลผิดพลาด";

    if(a.score < b.score)
        return `${a.name}(${a.score}) < ${b.name}(${b.score}) → ไม่สลับ`;

    if(a.score > b.score)
        return `${a.name}(${a.score}) > ${b.name}(${b.score}) → ต้องสลับ`;

    if(a.name < b.name)
        return `คะแนนเท่ากัน (${a.score}) และ ${a.name} < ${b.name} → ไม่สลับ`;

    return `คะแนนเท่ากัน (${a.score}) แต่ ${a.name} > ${b.name} → ต้องสลับ`;
}

// ===== DRAW =====
function draw(arr,highlight={}){
    let bars=document.getElementById("bars");
    bars.innerHTML="";

    let width=Math.max(10,800/arr.length);

    arr.forEach((s,i)=>{
        if(!s || s.score===undefined) return; // 🔥 FIX undefined

        let d=document.createElement("div");
        d.className="bar";
        d.style.height=s.score*2+"px";
        d.style.width=width+"px";
        d.innerHTML=`${s.name}<br>${s.score}`;

        if(highlight.compare?.includes(i)) d.classList.add("compare");
        if(highlight.swap?.includes(i)) d.classList.add("swap");
        if(highlight.pivot?.includes(i)) d.classList.add("pivot");

        bars.appendChild(d);
    });
}

// ===== STEP =====
function addStep(arr,text,highlight={}){
    steps.push({
        arr: JSON.parse(JSON.stringify(arr)), // 🔥 deep copy FIX
        text,
        highlight
    });
}

// ===== TABLE =====
function addRow(i,s){
    let tr=document.createElement("tr");
    let arrText=s.arr.map(x=>`${x.name}(${x.score})`).join(", ");

    tr.innerHTML=`<td>${i+1}</td><td>${arrText}</td><td>${s.text}</td>`;
    document.getElementById("tbody").appendChild(tr);
}

// ===== NEXT =====
function nextStep(){
    if(stepIndex>=steps.length) return;

    let s=steps[stepIndex];

    draw(s.arr,s.highlight);
    document.getElementById("info").innerText=s.text;

    addRow(stepIndex,s);
    stepIndex++;
}

// ===== AUTO =====
function play(){
    if(timer) return;

    let speed=document.getElementById("speed").value;

    timer=setInterval(()=>{
        if(stepIndex>=steps.length){pause();return;}
        nextStep();
    },speed);
}

function pause(){
    clearInterval(timer);
    timer=null;
}

// ===== RANDOM (FIX 100+) =====
function randomStudents(){
    let n=parseInt(document.getElementById("size").value);
    let names="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    currentArr=[];

    for(let i=0;i<n;i++){
        currentArr.push({
            name: names[i % 26] + Math.floor(i / 26), // 🔥 FIX
            score: Math.floor(Math.random()*100)
        });
    }

    draw(currentArr);
}

// ===== START =====
function startSort(){
    pause();
    steps=[]; stepIndex=0;
    document.getElementById("tbody").innerHTML="";

    let algo=document.getElementById("algo").value;

    if(algo==="bubble") bubble(currentArr);
    if(algo==="selection") selection(currentArr);
    if(algo==="insertion") insertion(currentArr);
    if(algo==="merge") mergeSort(currentArr);
    if(algo==="quick") quickSort(currentArr);
    if(algo==="shell") shell(currentArr);

    nextStep();
}

// ===== BUBBLE =====
function bubble(arr){
    let a=JSON.parse(JSON.stringify(arr));

    for(let i=0;i<a.length;i++){
        for(let j=0;j<a.length-i-1;j++){

            addStep(a,
            `Bubble: เปรียบเทียบ ${a[j].name} กับ ${a[j+1].name}
→ ${explain(a[j],a[j+1])}`,
            {compare:[j,j+1]});

            if(shouldSwap(a[j],a[j+1])){
                [a[j],a[j+1]]=[a[j+1],a[j]];

                addStep(a,
                `สลับตำแหน่ง`,
                {swap:[j,j+1]});
            }
        }
    }
}

// ===== SELECTION =====
function selection(arr){
    let a=JSON.parse(JSON.stringify(arr));

    for(let i=0;i<a.length;i++){
        let min=i;

        for(let j=i+1;j<a.length;j++){
            addStep(a,
            `Selection: เปรียบเทียบ ${a[min].name} กับ ${a[j].name}
→ ${explain(a[min],a[j])}`,
            {compare:[min,j]});

            if(shouldSwap(a[min],a[j])) min=j;
        }

        [a[i],a[min]]=[a[min],a[i]];
        addStep(a,`นำค่าที่น้อยสุดมาไว้ตำแหน่ง ${i}`,{swap:[i,min]});
    }
}

// ===== INSERTION =====
function insertion(arr){
    let a=JSON.parse(JSON.stringify(arr));

    for(let i=1;i<a.length;i++){
        let key=a[i];
        let j=i-1;

        while(j>=0 && shouldSwap(a[j],key)){
            addStep(a,
            `Insertion: ${a[j].name} > ${key.name} → เลื่อน`,
            {compare:[j]});

            a[j+1]=a[j];
            j--;
        }

        a[j+1]=key;
        addStep(a,`แทรก ${key.name}`,{swap:[j+1]});
    }
}

// ===== MERGE =====
function mergeSort(arr){

    function merge(a){
        if(a.length<=1) return a;

        let mid=Math.floor(a.length/2);
        let left=merge(a.slice(0,mid));
        let right=merge(a.slice(mid));

        let res=[];

        while(left.length && right.length){
            if(shouldSwap(right[0],left[0])){
                res.push(left.shift());
            }else{
                res.push(right.shift());
            }
        }

        let merged=[...res,...left,...right];
        addStep(merged,"Merge: รวมข้อมูลเรียงแล้ว");
        return merged;
    }

    merge(JSON.parse(JSON.stringify(arr)));
}

// ===== QUICK =====
function quickSort(arr){

    function qs(a){
        if(a.length<=1) return a;

        let pivot=a[a.length-1];
        let left=[], right=[];

        addStep(a,`Pivot = ${pivot.name}`,{pivot:[a.length-1]});

        for(let i=0;i<a.length-1;i++){
            if(shouldSwap(pivot,a[i])) left.push(a[i]);
            else right.push(a[i]);
        }

        let res=[...qs(left),pivot,...qs(right)];
        addStep(res,"Quick: รวม");
        return res;
    }

    qs(JSON.parse(JSON.stringify(arr)));
}

// ===== SHELL =====
function shell(arr){
    let a=JSON.parse(JSON.stringify(arr));
    let n=a.length;

    for(let gap=Math.floor(n/2);gap>0;gap=Math.floor(gap/2)){
        for(let i=gap;i<n;i++){
            let temp=a[i];
            let j=i;

            while(j>=gap && shouldSwap(a[j-gap],temp)){
                addStep(a,
                `Shell: gap=${gap} เลื่อน`,
                {compare:[j-gap]});

                a[j]=a[j-gap];
                j-=gap;
            }

            a[j]=temp;
            addStep(a,`ใส่ตำแหน่งใหม่`,{swap:[j]});
        }
    }
}

</script>

</body>
</html>
