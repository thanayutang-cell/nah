<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedList Demo</title>
</head>

<body>
  <h1>LinkedList-Function Demo</h1>

  <div>
    <label>Data: </label>
    <input type="text" id="dataInput">

    <label>Index: </label>
    <input type="number" id="indexInput">
  </div>

  <br>

  <button onclick="doPush()">push</button>
  <button onclick="doPop()">pop</button>
  <button onclick="doUnshift()">unshift</button>
  <button onclick="doShift()">shift</button>
  <button onclick="doGet()">get</button>
  <button onclick="doSet()">set</button>
  <button onclick="doInsert()">insert</button>
  <button onclick="doRemove()">remove</button>

  <br><br>

  <h3>Result:</h3>
  <p id="result"></p>

  <script>
    // ✅ Node class
    class Node {
      constructor(data) {
        this.data = data;
        this.next = null;
      }
    }

    // ✅ LinkedList class
    class LinkedList {
      constructor() {
        this.head = null;
        this.tail = null;
        this.length = 0;
      }

      push(data) {
        let newNode = new Node(data);

        if (!this.head) {
          this.head = newNode;
          this.tail = newNode;
        } else {
          this.tail.next = newNode;
          this.tail = newNode;
        }

        this.length++;
      }

      pop() {
        if (!this.head) return null;

        let current = this.head;
        let prev = null;

        while (current.next) {
          prev = current;
          current = current.next;
        }

        if (prev) {
          prev.next = null;
          this.tail = prev;
        } else {
          this.head = null;
          this.tail = null;
        }

        this.length--;
        return current.data;
      }

      unshift(data) {
        let newNode = new Node(data);

        if (!this.head) {
          this.head = newNode;
          this.tail = newNode;
        } else {
          newNode.next = this.head;
          this.head = newNode;
        }

        this.length++;
      }

      shift() {
        if (!this.head) return null;

        let removed = this.head;
        this.head = this.head.next;

        if (!this.head) this.tail = null;

        this.length--;
        return removed.data;
      }

      get(index) {
        if (index < 0 || index >= this.length) return null;

        let current = this.head;
        let count = 0;

        while (count < index) {
          current = current.next;
          count++;
        }

        return current.data;
      }

      set(index, newData) {
        let current = this.head;
        let count = 0;

        while (count < index) {
          current = current.next;
          count++;
        }

        current.data = newData;
        return true;
      }

      insert(index, data) {
        if (index < 0 || index > this.length) return false;

        if (index === 0) return this.unshift(data);
        if (index === this.length) return this.push(data);

        let newNode = new Node(data);

        let prev = this.head;
        let count = 0;

        while (count < index - 1) {
          prev = prev.next;
          count++;
        }

        newNode.next = prev.next;
        prev.next = newNode;

        this.length++;
      }

      remove(index) {
        if (index === 0) return this.shift();
        if (index === this.length - 1) return this.pop();

        let prev = this.head;
        let count = 0;

        while (count < index - 1) {
          prev = prev.next;
          count++;
        }

        let removed = prev.next;
        prev.next = removed.next;

        this.length--;
        return removed.data;
      }

      print() {
        let arr = [];
        let current = this.head;

        while (current) {
          arr.push(current.data);
          current = current.next;
        }

        return arr.join(" -> ");
      }
    }

    // ✅ Create LinkedList object
    let list = new LinkedList();

    // ✅ Helper function show result
    function showResult(text) {
      document.getElementById("result").innerText =
        text + "\nList: " + list.print();
    }

    // ✅ Button functions
    function doPush() {
      let data = document.getElementById("dataInput").value;
      list.push(data);
      showResult("Push: " + data);
    }

    function doPop() {
      let removed = list.pop();
      showResult("Pop: " + removed);
    }

    function doUnshift() {
      let data = document.getElementById("dataInput").value;
      list.unshift(data);
      showResult("Unshift: " + data);
    }

    function doShift() {
      let removed = list.shift();
      showResult("Shift: " + removed);
    }

    function doGet() {
      let index = Number(document.getElementById("indexInput").value);
      showResult("Get: " + list.get(index));
    }

    function doSet() {
      let index = Number(document.getElementById("indexInput").value);
      let data = document.getElementById("dataInput").value;
      list.set(index, data);
      showResult("Set index " + index + " = " + data);
    }

    function doInsert() {
      let index = Number(document.getElementById("indexInput").value);
      let data = document.getElementById("dataInput").value;
      list.insert(index, data);
      showResult("Insert " + data + " at index " + index);
    }

    function doRemove() {
      let index = Number(document.getElementById("indexInput").value);
      let removed = list.remove(index);
      showResult("Remove index " + index + ": " + removed);
    }
  </script>
</body>
</html>
