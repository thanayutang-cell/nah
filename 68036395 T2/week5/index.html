    <script>
        class Node {
    constructor(value = "x") {
        this.value = value;
        this.next = null;
    }

    setValue(value) {
        this.value = value;
    }

    getNode() {
        console.log("[" + this.value + "|" + this.next + "]");
    }
}

        class LinkedList {
    constructor() {
        this.head = null;
        this.last = this.head;
    }
    ship() {   
        if (this.head == null) {
            console.log("List is empty");
            return;
        }

        this.head = this.head.next;
    }

    unship(value){
    let newNode = new Node(value);

    if(this.head == null){
        this.head = newNode;
    } else {
        newNode.next = this.head;
        this.head = newNode;
    }
}

    push(value){
            let newNode = new Node(value);
            let tmp = this.head;
            if(tmp == null)
                this.head = newNode;
            else{
                while(tmp.next !=null ){
                    tmp = tmp.next;
                }
                tmp.next = newNode;
            }
        }
    pop(value){
            if(this.head != null){
                if(this.head.next == null){
                    this.head = null;
                }else{
                    let current= this.head.next;
                    let tmp = this.head;
                    while(current.next!=null){
                        tmp = current;
                        current = current.next;
                    }
                    tmp.next = null;
                }
            }else console.log("can't pop() in List...");
        }
    getList() {
        if (this.head == null)
            return "List is Empty ! \n[ ]";
        else {
            let result = "List is not Empty \n";
            let tmp = this.head;

            result += "[" + tmp.value + "]-->";

            while (tmp.next != null) {
                tmp = tmp.next;
                result += "[" + tmp.value + "]-->";
            }

            return result + "null";
        }
    }
}
let list = new LinkedList();
    console.log(list.getList());
    list.unship('A');
    list.unship('B');
    list.unship('C');
    console.log(list.getList());
    list.ship();list.ship();list.ship();
    console.log(list.getList());
    list.push(10);list.push(20);list.push(30);
    console.log(list.getList());
    list.pop();list.pop();list.pop();
