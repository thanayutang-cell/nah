<!DOCTYPE html>
<html>
<head>
<title>Infix to Postfix</title>
<style>
body{
font-family: Arial;
padding:20px;
}
input{
width:300px;
padding:8px;
}
button{
padding:8px 15px;
}
</style>
</head>

<body>

<h2>Infix → Postfix Converter</h2>

<input id="expression" placeholder="Example: A+B*C">
<button onclick="convert()">Convert</button>

<h3 id="result"></h3>

<script>

function getPrecedence(op){

if(op == '*' || op == '/')
return 3

if(op == '+' || op == '-')
return 2

return 0
}

function isOperand(ch){
return /[a-zA-Z0-9]/.test(ch)
}

function infixToPostfix(expression){

let stack = []
let output = ""

for(let i=0;i<expression.length;i++){

let char = expression[i]

if(char == " ")
continue

// operand
if(isOperand(char)){
output += char
}

// (
else if(char == '('){
stack.push(char)
}

// )
else if(char == ')'){

while(stack.length && stack[stack.length-1] != '('){
output += stack.pop()
}

stack.pop()
}

// operator
else{

while(
stack.length &&
getPrecedence(stack[stack.length-1]) >= getPrecedence(char)
){
output += stack.pop()
}

stack.push(char)

}

}

// pop stack
while(stack.length){
output += stack.pop()
}

return output

}

function convert(){

let exp = document.getElementById("expression").value
let result = infixToPostfix(exp)

document.getElementById("result").innerHTML =
"Postfix : " + result

}

</script>

</body>
</html>
