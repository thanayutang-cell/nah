<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infix to Postfix Converter</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
}

input{
    width:90%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:15px;
}

button{
    background:#667eea;
    color:white;
    border:none;
    padding:12px 20px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4c5fd7;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f3f3f3;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
}

.stackBox{
    margin-top:20px;
    font-size:14px;
    color:#555;
}

</style>
</head>

<body>

<div class="container">

<h1>Infix → Postfix</h1>

<input id="expression" placeholder="Example: A+(B*C)" />

<br>

<button onclick="convert()">Convert</button>

<div class="result">
Postfix : <span id="output">-</span>
</div>

<div class="stackBox">
Stack: <span id="stackView">[]</span>
</div>

</div>

<script>

// precedence function
function getPrecedence(op){

    if(op == '+' || op == '-')
        return 1

    if(op == '*' || op == '/')
        return 2

    if(op == '^')
        return 3

    return 0
}


// check operand
function isOperand(ch){
    return /[A-Za-z0-9]/.test(ch)
}


// infix to postfix
function infixToPostfix(expression){

    let stack = []
    let output = ""

    for(let i=0;i<expression.length;i++){

        let char = expression[i]

        // operand
        if(isOperand(char)){
            output += char
        }

        // (
        else if(char == '('){
            stack.push(char)
        }

        // )
        else if(char == ')'){

            while(stack.length && stack[stack.length-1] != '('){
                output += stack.pop()
            }

            stack.pop()
        }

        // operator
        else{

            while(
                stack.length &&
                getPrecedence(stack[stack.length-1]) >= getPrecedence(char)
            ){
                output += stack.pop()
            }

            stack.push(char)
        }
    }

    while(stack.length){
        output += stack.pop()
    }

    return {
        postfix:output,
        stack:stack
    }
}


// convert button
function convert(){

    let exp = document.getElementById("expression").value.replace(/\s/g,'')

    let result = infixToPostfix(exp)

    document.getElementById("output").innerText = result.postfix

    document.getElementById("stackView").innerText = JSON.stringify(result.stack)

}

</script>

</body>
</html>
